  chain_beta: {kind: evm, label: Chain Beta, chain_id: "1002", rpc_url_env: CHAIN_BETA_RPC}
assets:
  asset_x: {symbol: ASSET_X}
  wrapped_native: {symbol: WNATIVE}
  usd: {symbol: USD}
tokens:
