  wrapped_alpha: {asset: wrapped_native, chain: chain_alpha, address: "0x0000000000000000000000000000000000000012", decimals: 18, symbol: WNATIVE}
  asset_x_beta: {asset: asset_x, chain: chain_beta, address: "0x0000000000000000000000000000000000000021", decimals: 18, symbol: ASSET_X}
