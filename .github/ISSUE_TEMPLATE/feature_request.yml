name: Feature proposal
description: Propose a non-sensitive improvement for discussion.
title: "proposal: "
labels: [proposal]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which user or engineering problem should be solved?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe observable success without prescribing implementation.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
