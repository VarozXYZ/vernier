name: Bug report
description: Report reproducible, non-sensitive incorrect behavior.
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include secrets or operational information.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction and exact revision.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include sanitized logs or test output when useful.
